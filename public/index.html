<!DOCTYPE html>
<html>
<head>
  <title>AI Rörmokare</title>
</head>
<body>

<h2>AI Rörmokare</h2>
<div id="chat"></div>

<input id="msg" placeholder="Skriv..." />
<button onclick="send()">Skicka</button>

<script>
async function send() {
  const input = document.getElementById("msg");
  const text = input.value;

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();
  document.getElementById("chat").innerHTML += "<p><b>Du:</b> " + text + "</p>";
  data.replies.forEach(r => {
    document.getElementById("chat").innerHTML += "<p><b>Bot:</b> " + r + "</p>";
  });

  input.value = "";
}
</script>

</body>
</html>
