<!DOCTYPE html>
<html>
<head>
  <title>Johanneshovrör</title>

  <style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
  }

  /* -------- BUTTON -------- */
  #chat-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2563eb, #1e40af);
    color: white;
    font-size: 22px;
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
    transition: transform 0.2s ease;
    z-index: 10;
  }

  #chat-button:hover {
    transform: scale(1.05);
  }

  /* -------- HINT -------- */
  #chat-hint {
    position: fixed;
    bottom: 90px;
    right: 20px;
    background: white;
    padding: 10px 14px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    font-size: 13px;
    cursor: pointer;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* -------- WIDGET -------- */
  #chat-widget {
    display: none;
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 340px;
    height: 480px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    overflow: hidden;
    flex-direction: column;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* -------- HEADER -------- */
  #chat-header {
    background: linear-gradient(135deg, #2563eb, #1e40af);
    color: white;
    padding: 14px;
    font-weight: 600;
    font-size: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #chat-header span {
    font-size: 12px;
    opacity: 0.8;
    cursor: pointer;
  }

  /* -------- CHAT BOX -------- */
  #chat-box {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
    background: #f8fafc;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* -------- MESSAGES -------- */
  .msg {
    padding: 10px 14px;
    border-radius: 16px;
    max-width: 75%;
    font-size: 14px;
    line-height: 1.4;
    word-wrap: break-word;
  }

  .user {
    background: linear-gradient(135deg, #2563eb, #1e40af);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 6px;
  }

  .bot {
    background: white;
    color: #111;
    align-self: flex-start;
    border-bottom-left-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  /* -------- TYPING -------- */
  .typing {
    display: flex;
    gap: 6px;
    padding: 10px 14px;
    background: white;
    border-radius: 16px;
    width: fit-content;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .dot {
    width: 6px;
    height: 6px;
    background: #666;
    border-radius: 50%;
    animation: blink 1.4s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0% { opacity: 0.2; }
    20% { opacity: 1; }
    100% { opacity: 0.2; }
  }

  /* -------- INPUT -------- */
  #chat-input-area {
    display: flex;
    padding: 10px;
    background: white;
    border-top: 1px solid #eee;
  }

  #chat-input {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 999px;
    padding: 10px 14px;
    outline: none;
    font-size: 14px;
  }

  #chat-input:focus {
    border-color: #2563eb;
  }

  #send-btn {
    margin-left: 8px;
    background: linear-gradient(135deg, #2563eb, #1e40af);
    color: white;
    border: none;
    border-radius: 999px;
    padding: 10px 14px;
    cursor: pointer;
  }

  /* -------- MOBILE -------- */
  @media (max-width: 500px) {
    #chat-widget {
      width: 100%;
      height: 100%;
      bottom: 0;
      right: 0;
      border-radius: 0;
    }

    #chat-button {
      bottom: 15px;
      right: 15px;
    }
  }
</style>
</head>

<body>

<h1>Johanneshovrör</h1>
<p>Välkommen! Vi hjälper dig med VVS.</p>

<div id="chat-hint" onclick="openChat()">
  Behöver du hjälp? Boka här 👋
</div>

<button id="chat-button" onclick="toggleChat()">💬</button>

<div id="chat-widget">
  <div id="chat-header">
    Johanneshovrör Support
    <span onclick="clearChat()">Rensa</span>
  </div>

  <div id="chat-box"></div>

  <div id="chat-input-area">
    <input id="chat-input" placeholder="Skriv meddelande...">
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>

// -------- USER --------
const userId = localStorage.getItem("userId") || crypto.randomUUID();
localStorage.setItem("userId", userId);

// -------- HISTORY --------
function loadHistory() {
  let history = JSON.parse(localStorage.getItem("chatHistory") || "[]");
  history.slice(-50).forEach(msg => addMessage(msg.text, msg.sender, false));
}

function saveMessage(text, sender) {
  let history = JSON.parse(localStorage.getItem("chatHistory") || "[]");

  history.push({ text, sender });

  if (history.length > 50) {
    history = history.slice(-50);
  }

  localStorage.setItem("chatHistory", JSON.stringify(history));
}

// -------- UI --------
function toggleChat() {
  let chat = document.getElementById("chat-widget");

  if (chat.style.display === "flex") {
    chat.style.display = "none";
  } else {
    chat.style.display = "flex";
    document.getElementById("chat-input").focus();
  }
}

function openChat() {
  document.getElementById("chat-widget").style.display = "flex";
  document.getElementById("chat-hint").style.display = "none";
}

function clearChat() {
  localStorage.removeItem("chatHistory");
  const box = document.getElementById("chat-box");
  box.innerHTML = "";
  addMessage("Tja! Vad kan jag hjälpa dig med? 🙂", "bot");
}

function addMessage(text, sender, save = true) {
  let box = document.getElementById("chat-box");

  let div = document.createElement("div");
  div.classList.add("msg", sender);
  div.innerText = text;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;

  if (save) saveMessage(text, sender);
}

// -------- TYPING --------
function showTyping() {
  removeTyping();

  let box = document.getElementById("chat-box");

  let typing = document.createElement("div");
  typing.classList.add("typing");
  typing.id = "typing";

  typing.innerHTML = `
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  `;

  box.appendChild(typing);
  box.scrollTop = box.scrollHeight;
}

function removeTyping() {
  let typing = document.getElementById("typing");
  if (typing) typing.remove();
}

// -------- FETCH RETRY --------
async function fetchWithRetry(url, options, retries = 2) {
  try {
    let res = await fetch(url, options);
    if (!res.ok) throw new Error();
    return await res.json();
  } catch (err) {
    if (retries > 0) {
      await new Promise(r => setTimeout(r, 1000));
      return fetchWithRetry(url, options, retries - 1);
    } else {
      throw err;
    }
  }
}

// -------- SEND --------
let isSending = false;

async function sendMessage() {
  let input = document.getElementById("chat-input");
  let msg = input.value.trim();

  if (!msg || isSending) return;

  isSending = true;

  addMessage(msg, "user");
  input.value = "";

  showTyping();

  try {
    // Wake backend (Render cold start)
    await fetch("https://ai-rormokare.onrender.com/");

    const data = await fetchWithRetry(
      "https://ai-rormokare.onrender.com/chat",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg, userId })
      }
    );

    removeTyping();

    for (let reply of data.replies) {
      addMessage(reply, "bot");
    }

  } catch (err) {
    removeTyping();
    addMessage("⚠️ Kunde inte nå servern. Försök igen.", "bot");
  }

  isSending = false;
}

// -------- ENTER --------
document.getElementById("chat-input").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

// -------- INIT --------
loadHistory();

if (JSON.parse(localStorage.getItem("chatHistory") || "[]").length === 0) {
  addMessage("Tja! Vad kan jag hjälpa dig med? 🙂", "bot");
}

</script>

</body>
</html>
