<!DOCTYPE html>
<html>
<head>
  <title>Johanneshovrör</title>

  <style>
    body {
      font-family: Arial, sans-serif;
    }

    #chat-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #0a7cff;
      color: white;
      font-size: 24px;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    #chat-widget {
      display: none;
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 330px;
      height: 450px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      overflow: hidden;
      flex-direction: column;
    }

    #chat-header {
      background: #0a7cff;
      color: white;
      padding: 12px;
      font-weight: bold;
    }

    #chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #f5f7fa;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 8px 12px;
      border-radius: 12px;
      margin: 5px 0;
      max-width: 75%;
      font-size: 14px;
    }

    .user {
      background: #0a7cff;
      color: white;
      align-self: flex-end;
    }

    .bot {
      background: #e4e6eb;
      align-self: flex-start;
    }

    .typing {
      display: flex;
      gap: 5px;
      padding: 8px 12px;
      background: #e4e6eb;
      border-radius: 12px;
      width: fit-content;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #666;
      border-radius: 50%;
      animation: blink 1.4s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0% { opacity: 0.2; }
      20% { opacity: 1; }
      100% { opacity: 0.2; }
    }

    #chat-input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }

    #chat-input {
      flex: 1;
      border: none;
      padding: 12px;
      outline: none;
    }

    #send-btn {
      background: #0a7cff;
      color: white;
      border: none;
      padding: 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Johanneshovrör</h1>
<p>Välkommen! Vi hjälper dig med VVS.</p>

<button id="chat-button" onclick="toggleChat()">💬</button>

<div id="chat-widget">
  <div id="chat-header">Johanneshovrör Support</div>
  <div id="chat-box"></div>

  <div id="chat-input-area">
    <input id="chat-input" placeholder="Skriv meddelande...">
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>

// -------- USER --------
const userId = localStorage.getItem("userId") || crypto.randomUUID();
localStorage.setItem("userId", userId);

// -------- CHAT HISTORY --------
function loadHistory() {
  let history = JSON.parse(localStorage.getItem("chatHistory") || "[]");

  history.forEach(msg => {
    addMessage(msg.text, msg.sender, false);
  });
}

function saveMessage(text, sender) {
  let history = JSON.parse(localStorage.getItem("chatHistory") || "[]");
  history.push({ text, sender });
  localStorage.setItem("chatHistory", JSON.stringify(history));
}

// -------- UI --------
function toggleChat() {
  let chat = document.getElementById("chat-widget");
  chat.style.display = chat.style.display === "none" ? "flex" : "none";
}

function addMessage(text, sender, save = true) {
  let box = document.getElementById("chat-box");

  let div = document.createElement("div");
  div.classList.add("msg", sender);
  div.innerText = text;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;

  if (save) saveMessage(text, sender);
}

// -------- TYPING --------
function showTyping() {
  let box = document.getElementById("chat-box");

  let typing = document.createElement("div");
  typing.classList.add("typing");
  typing.id = "typing";

  typing.innerHTML = `
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  `;

  box.appendChild(typing);
  box.scrollTop = box.scrollHeight;
}

function removeTyping() {
  let typing = document.getElementById("typing");
  if (typing) typing.remove();
}

// -------- SHOW REPLIES --------
async function showReplies(replies) {
  for (let msg of replies) {
    showTyping();
    await new Promise(r => setTimeout(r, 600));
    removeTyping();
    addMessage(msg, "bot");
  }
}

// -------- SEND --------
let isSending = false;

async function sendMessage() {
  let input = document.getElementById("chat-input");
  let msg = input.value.trim();

  if (!msg || isSending) return;

  isSending = true;

  addMessage(msg, "user");
  input.value = "";

  try {
    // wake backend silently
    fetch("https://ai-rormokare.onrender.com/ping").catch(()=>{});

    let res = await fetch("https://ai-rormokare.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: msg,
        userId: userId
      })
    });

    let data = await res.json();
    await showReplies(data.replies);

  } catch (err) {
    // ❌ NO ugly error message anymore
    addMessage("Hmm... något gick fel, testar igen...", "bot");

    setTimeout(() => {
      sendMessage(); // auto retry
    }, 2000);
  }

  isSending = false;
}

// enter key
document.getElementById("chat-input").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

// -------- INIT --------
loadHistory();

if (!localStorage.getItem("chatHistory")) {
  addMessage("Tja! Vad kan jag hjälpa dig med? 🙂", "bot");
}

</script>

</body>
</html>
