<!DOCTYPE html>
<html>
<head>
  <title>Johanneshovrör</title>

  <style>
    body { font-family: Arial, sans-serif; }

    #chat-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #0a7cff;
      color: white;
      font-size: 24px;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      z-index: 10;
    }

    #chat-hint {
      position: fixed;
      bottom: 90px;
      right: 20px;
      background: white;
      padding: 10px 14px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      font-size: 13px;
      cursor: pointer;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #chat-widget {
      display: none;
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 330px;
      height: 450px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      overflow: hidden;
      flex-direction: column;
    }

    #chat-header {
      background: #0a7cff;
      color: white;
      padding: 12px;
      font-weight: bold;
    }

    #chat-header span {
      float: right;
      cursor: pointer;
      font-size: 12px;
      opacity: 0.9;
    }

    #chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #f5f7fa;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 8px 12px;
      border-radius: 12px;
      margin: 5px 0;
      max-width: 75%;
      font-size: 14px;
    }

    .user {
      background: #0a7cff;
      color: white;
      align-self: flex-end;
    }

    .bot {
      background: #e4e6eb;
      align-self: flex-start;
    }

    .typing {
      display: flex;
      gap: 5px;
      padding: 8px 12px;
      background: #e4e6eb;
      border-radius: 12px;
      margin: 5px 0;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #666;
      border-radius: 50%;
      animation: blink 1.4s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0% { opacity: 0.2; }
      20% { opacity: 1; }
      100% { opacity: 0.2; }
    }

    #chat-input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }

    #chat-input {
      flex: 1;
      border: none;
      padding: 12px;
      outline: none;
    }

    #send-btn {
      background: #0a7cff;
      color: white;
      border: none;
      padding: 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Johanneshovrör</h1>
<p>Välkommen! Vi hjälper dig med VVS.</p>

<!-- Hint -->
<div id="chat-hint" onclick="openChat()">
  Behöver du hjälp? Boka här 👋
</div>

<button id="chat-button" onclick="toggleChat()">💬</button>

<div id="chat-widget">
  <div id="chat-header">
    Johanneshovrör Support
    <span onclick="clearChat()">Rensa</span>
  </div>

  <div id="chat-box"></div>

  <div id="chat-input-area">
    <input id="chat-input" placeholder="Skriv meddelande...">
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>

// -------- USER --------
const userId = localStorage.getItem("userId") || crypto.randomUUID();
localStorage.setItem("userId", userId);

// -------- HISTORY --------
function loadHistory() {
  let history = JSON.parse(localStorage.getItem("chatHistory") || "[]");
  history.forEach(msg => addMessage(msg.text, msg.sender, false));
}

function saveMessage(text, sender) {
  let history = JSON.parse(localStorage.getItem("chatHistory") || "[]");
  history.push({ text, sender });
  localStorage.setItem("chatHistory", JSON.stringify(history));
}

// -------- UI --------
function toggleChat() {
  let chat = document.getElementById("chat-widget");
  chat.style.display = chat.style.display === "none" ? "flex" : "none";
}

function openChat() {
  document.getElementById("chat-widget").style.display = "flex";
  document.getElementById("chat-hint").style.display = "none";
}

function clearChat() {
  localStorage.removeItem("chatHistory");
  const box = document.getElementById("chat-box");
  box.innerHTML = "";
  addMessage("Tja! Vad kan jag hjälpa dig med? 🙂 (chatten sparas)", "bot");
}

function addMessage(text, sender, save = true) {
  let box = document.getElementById("chat-box");

  let div = document.createElement("div");
  div.classList.add("msg", sender);
  div.innerText = text;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;

  if (save) saveMessage(text, sender);
}

// -------- TYPING --------
function showTyping() {
  removeTyping();

  let box = document.getElementById("chat-box");

  let typing = document.createElement("div");
  typing.classList.add("typing");
  typing.id = "typing";

  typing.innerHTML = `
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  `;

  box.appendChild(typing);
  box.scrollTop = box.scrollHeight;
}

function removeTyping() {
  let typing = document.getElementById("typing");
  if (typing) typing.remove();
}

// -------- FETCH RETRY --------
async function fetchWithRetry(url, options, retries = 3) {
  try {
    let res = await fetch(url, options);
    if (!res.ok) throw new Error();
    return await res.json();
  } catch (err) {
    if (retries > 0) {
      await new Promise(r => setTimeout(r, 1000));
      return fetchWithRetry(url, options, retries - 1);
    } else {
      throw err;
    }
  }
}

// -------- SHOW REPLIES --------
async function showReplies(replies) {
  for (let msg of replies) {
    await new Promise(r => setTimeout(r, 500));
    addMessage(msg, "bot");
  }
}

// -------- SEND --------
let isSending = false;

async function sendMessage() {
  let input = document.getElementById("chat-input");
  let msg = input.value.trim();

  if (!msg || isSending) return;

  isSending = true;

  addMessage(msg, "user");
  input.value = "";

  showTyping();

  try {
    fetch("https://ai-rormokare.onrender.com/").catch(()=>{});

    const data = await fetchWithRetry(
      "https://ai-rormokare.onrender.com/chat",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg, userId })
      }
    );

    removeTyping();
    await showReplies(data.replies);

  } catch {
    setTimeout(() => sendMessage(), 1500);
  }

  isSending = false;
}

// -------- ENTER --------
document.getElementById("chat-input").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

// -------- INIT --------
loadHistory();

if (JSON.parse(localStorage.getItem("chatHistory") || "[]").length === 0) {
  addMessage("Tja! Vad kan jag hjälpa dig med? 🙂 (chatten sparas)", "bot");
}

</script>

</body>
</html>
