<!DOCTYPE html>
<html>
<head>
  <title>Johanneshovrör</title>

  <style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
  }

  #chat-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2563eb, #1e40af);
    color: white;
    font-size: 22px;
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
  }

  #chat-hint {
    position: fixed;
    bottom: 90px;
    right: 20px;
    background: white;
    padding: 10px 14px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    font-size: 13px;
    cursor: pointer;
  }

  #chat-widget {
    display: none;
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 340px;
    height: 480px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    overflow: hidden;
    flex-direction: column;
  }

  #chat-header {
    background: linear-gradient(135deg, #2563eb, #1e40af);
    color: white;
    padding: 14px;
    display: flex;
    justify-content: space-between;
  }

  #chat-box {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
    background: #f8fafc;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .msg {
    padding: 10px 14px;
    border-radius: 16px;
    max-width: 75%;
  }

  .user {
    background: #2563eb;
    color: white;
    align-self: flex-end;
  }

  .bot {
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    align-self: flex-start;
  }

  #chat-input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #eee;
  }

  #chat-input {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 999px;
    padding: 10px;
  }

  #send-btn {
    margin-left: 8px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 999px;
    padding: 10px 14px;
    cursor: pointer;
  }
  </style>
</head>

<body>

<h1>Johanneshovrör</h1>

<div id="chat-hint" onclick="openChat()">
  Behöver du hjälp? Boka här 👋
</div>

<button id="chat-button" onclick="toggleChat()">💬</button>

<div id="chat-widget">
  <div id="chat-header">
    Support
    <span onclick="clearChat()">Rensa</span>
  </div>

  <div id="chat-box"></div>

  <div id="chat-input-area">
    <input id="chat-input" placeholder="Skriv...">
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const userId = localStorage.getItem("userId") || crypto.randomUUID();
localStorage.setItem("userId", userId);

let isSending = false;

// -------- UI --------
function toggleChat() {
  const chat = document.getElementById("chat-widget");

  if (chat.style.display === "flex") {
    chat.style.display = "none";
  } else {
    chat.style.display = "flex";
    document.getElementById("chat-input").focus();
    document.getElementById("chat-hint").style.display = "none";
  }
}

function openChat() {
  document.getElementById("chat-widget").style.display = "flex";
  document.getElementById("chat-hint").style.display = "none";
}

function clearChat() {
  localStorage.removeItem("chatHistory");
  document.getElementById("chat-box").innerHTML = "";
  addMessage("Tja! Vad kan jag hjälpa dig med? 🙂", "bot");
}

// -------- CHAT --------
function addMessage(text, sender, save = true) {
  const box = document.getElementById("chat-box");

  const div = document.createElement("div");
  div.className = "msg " + sender;
  div.innerText = text;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;

  if (save) {
    let history = JSON.parse(localStorage.getItem("chatHistory") || "[]");
    history.push({ text, sender });
    localStorage.setItem("chatHistory", JSON.stringify(history.slice(-50)));
  }
}

// -------- TYPING --------
function showTyping() {
  const box = document.getElementById("chat-box");

  const typing = document.createElement("div");
  typing.id = "typing";
  typing.className = "msg bot";
  typing.innerText = "...";

  box.appendChild(typing);
}

function removeTyping() {
  const el = document.getElementById("typing");
  if (el) el.remove();
}

// -------- SEND --------
async function sendMessage() {
  const input = document.getElementById("chat-input");
  const msg = input.value.trim();

  if (!msg || isSending) return;

  isSending = true;

  addMessage(msg, "user");
  input.value = "";

  showTyping();

  try {
    // ✅ fixed ping
    await fetch("https://ai-rormokare.onrender.com/ping");

    const res = await fetch("https://ai-rormokare.onrender.com/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, userId })
    });

    const data = await res.json();

    removeTyping();

    data.replies.forEach(r => addMessage(r, "bot"));

  } catch {
    removeTyping();
    addMessage("⚠️ Kunde inte nå servern.", "bot");
  }

  isSending = false;
}

// -------- ENTER FIX --------
document.getElementById("chat-input").addEventListener("keypress", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// -------- INIT --------
(function init() {
  const history = JSON.parse(localStorage.getItem("chatHistory") || "[]");

  history.forEach(m => addMessage(m.text, m.sender, false));

  if (history.length === 0) {
    addMessage("Tja! Vad kan jag hjälpa dig med? 🙂", "bot");
  }

  // optional: show hint after delay
  setTimeout(() => {
    document.getElementById("chat-hint").style.display = "block";
  }, 2000);
})();
</script>

</body>
</html>
